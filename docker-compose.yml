# ══════════════════════════════════════════════════════════════
# Dev Container — Docker Compose
# ══════════════════════════════════════════════════════════════
# Hardware de referência:
#   CPU:  Intel i7-1255U (10 cores / 12 threads, 4.7GHz boost)
#   RAM:  32 GB DDR4 3160MHz
#   GPU:  Intel Iris Xe (iGPU) — sem GPU dedicada
#   Disco: 1 TB NVMe (Crucial P3 Plus)
#
# Uso:
#   docker compose up -d
# ══════════════════════════════════════════════════════════════

services:
  dev:
    build: .
    container_name: dev-container
    hostname: dev-container

    restart: "no"

    # ── Volumes ──
    volumes:
      - ./projects:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock

    # ── Portas ──
    ports:
      - "8888:8888" # Interface do Jupyter Notebook

    # ── Entrypoint ──
    # O entrypoint.sh (embarcado na imagem via Dockerfile) executa como root:
    #   1. Ajusta inotify (HMR do Node.js)
    #   2. Corrige permissões do /workspace e docker.sock
    #   3. Dropa para devuser via exec su
    # Isso é compatível com no-new-privileges (sem sudo) e mantém
    # Config.User=devuser para o VS Code/Antigravity detectar corretamente.

    # ── Limites de Recursos ──
    # Planejamento: 32 GB total → ~10 GB para o host (SO + Desktop) + ~16 GB para o container
    #              12 threads  → 4 para o host + 8 para o container
    #
    # Em treinamentos de IA/ML via CPU (sem NVIDIA), memória RAM e threads
    # são os recursos críticos. O DataLoader do PyTorch utiliza /dev/shm para IPC.
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 16G
        reservations:
          cpus: "1"
          memory: 2G

    # ── Memória Compartilhada (Shared Memory) ──
    # O DataLoader do PyTorch (com num_workers > 0) usa /dev/shm para
    # comunicação entre processos (IPC). O padrão do Docker (64MB) é
    # insuficiente para lotes (batches) grandes.
    # 4 GB representa ~16% da RAM do container, ideal para a maioria dos datasets.
    shm_size: "4gb"

    # ── Tmpfs para /scratch (armazenado em RAM, limpeza automática) ──
    # 512 MB reservados para fluxos de IA (serialização de modelos e checkpoints temporários)
    # IMPORTANTE: Não usar tmpfs no /tmp — o docker cp (usado pelo VS Code e
    # Antigravity para instalar o servidor remoto) escreve na camada de filesystem
    # subjacente, e o tmpfs montado sobre /tmp mascara esses arquivos, causando
    # "No such file or directory" no bootstrap do servidor.
    tmpfs:
      - /scratch:size=512M

    # ── Segurança ──
    # NOTA: no-new-privileges foi removido porque bloqueia sudo, que é
    # necessário no entrypoint.sh para sysctl/chown. Em um container de
    # desenvolvimento, a fronteira de segurança é o próprio container —
    # sudo interno é esperado. O container roda como devuser (non-root)
    # por padrão, com sudo NOPASSWD apenas para configurações de sistema.
